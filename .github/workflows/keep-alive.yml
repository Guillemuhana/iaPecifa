# ============================================================
# Keep-alive del backend en Render (plan free)
# ------------------------------------------------------------
# Le pega cada 10 minutos a /api/health para que Render no
# duerma el servicio (y el modelo de embeddings quede cargado).
#
# CONFIGURACIÓN (una sola vez):
#   En GitHub: Settings > Secrets and variables > Actions > Variables
#   creá una variable llamada  BACKEND_URL  con la URL de tu backend
#   en Render, por ejemplo:    https://pecifa-backend.onrender.com
#
# Nota: los cron de GitHub Actions pueden retrasarse unos minutos y
# se desactivan tras 60 días sin actividad en el repo. Para algo más
# fiable, sumá también un monitor gratis en https://uptimerobot.com
# ============================================================
name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *" # cada 10 minutos
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping al backend
        run: |
          if [ -z "${{ vars.BACKEND_URL }}" ]; then
            echo "⚠️  Falta la variable BACKEND_URL. Configurala en Settings > Variables."
            echo "    El workflow no hace nada hasta que la cargues."
            exit 0
          fi
          echo "Pingeando ${{ vars.BACKEND_URL }}/api/health ..."
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "${{ vars.BACKEND_URL }}/api/health")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "El backend no respondió 200 (puede estar despertando). No se considera fallo."
          fi
